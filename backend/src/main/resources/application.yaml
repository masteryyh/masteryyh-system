server:
  port: ${PORT:8080}

spring:
  config:
    import: "optional:file:.env[.properties]"
  threads:
    virtual:
      enabled: true
  application:
    name: masteryyh-system
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 105MB
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/test}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:abc123456}
  data:
    redis:
      redisson:
        file: classpath:redisson.yaml
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

management:
  endpoints:
    web:
      base-path: "/metrics"
      exposure:
        include: "*"

system:
  jwt-secret: ${JWT_SECRET:change-this-secret-to-at-least-32-characters}
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:abc123456}
    email: ${ADMIN_EMAIL:admin@example.com}
  credential:
    expiring-soon-days: 30
  file:
    max-size: 104857600
    s3:
      endpoint: ${S3_ENDPOINT:https://s3.us-east-1.amazonaws.com}
      region: ${S3_REGION:us-east-1}
      bucket: ${S3_BUCKET:masteryyh-system}
      access-key: ${S3_ACCESS_KEY:some-access-key}
      secret-key: ${S3_SECRET_KEY:some-secret-key}
      path-style-access: ${S3_PATH_STYLE_ACCESS:true}
  gateway:
    max-static-files: 10000
    max-static-uncompressed-size: 536870912
